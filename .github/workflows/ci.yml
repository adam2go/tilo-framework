name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  install-surface:
    name: Clean-install import surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tilo with NO optional deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./backend
      - name: Verify the one-line API works without openai/anthropic/psycopg
        # This guards against anyone eagerly importing an optional dependency.
        run: |
          python - <<'PY'
          import tilo
          assert callable(tilo.generate)
          assert callable(tilo.view)
          assert callable(tilo.to_html)
          from tilo.prompt import AIPPromptBuilder
          b = AIPPromptBuilder("review my contract", skill="contract_review")
          assert "diff" in b.user_prompt().lower() or "radar" in b.user_prompt().lower()
          html = tilo.to_html({
              "version": "tilo/aip/v1", "title": "CI", "status": "ready",
              "blocks": [{"id": "b", "type": "heading", "props": {"text": "ok"}}],
              "views": [{"id": "v", "label": "V", "block_ids": ["b"]}],
          })
          assert "CI" in html
          # Optional deps must NOT be importable here (proves they're optional).
          # Includes the server stack: the lean library must not pull FastAPI/DB.
          for mod in ("openai", "anthropic", "psycopg", "fastapi", "uvicorn", "sqlalchemy", "alembic"):
              try:
                  __import__(mod)
                  raise SystemExit(f"{mod} should not be installed in the lean surface")
              except ImportError:
                  pass
          print("lean-install surface OK — generate/view work with only pydantic+pyyaml")
          PY

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:////tmp/tilo_ci.db
      LLM_ENABLED: "false"
      LLM_PROVIDER: openai
      OPENAI_API_KEY: ""
      LLM_BASE_URL: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "backend[test]"
      - name: Validate example apps
        run: |
          python scripts/validate_app.py examples/apps/contract-review-agent
          python scripts/validate_app.py examples/apps/sales-followup-agent
      - name: Regenerate surface schema (Python version may differ)
        run: python scripts/export_surface_schema.py
      - name: Run backend tests
        run: python -m pytest backend/tests
      - name: Run baseline eval
        run: python evals/runners/run_baseline_eval.py

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        working-directory: frontend
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm build

  demo:
    name: Local demo verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LLM_ENABLED: "false"
      LLM_PROVIDER: openai
      OPENAI_API_KEY: ""
      LLM_BASE_URL: ""
      WAIT_ATTEMPTS: "45"
      WAIT_SECONDS: "2"
    steps:
      - uses: actions/checkout@v4
      - name: Build and start local stack
        run: docker compose up --build -d
      - name: Verify local demo
        run: bash scripts/verify_local_demo.sh
      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --tail=200
      - name: Stop local stack
        if: always()
        run: docker compose down -v
