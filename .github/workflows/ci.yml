name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:////tmp/tilo_ci.db
      LLM_ENABLED: "false"
      LLM_PROVIDER: openai
      OPENAI_API_KEY: ""
      LLM_BASE_URL: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "backend[test]"
      - name: Validate example apps
        run: |
          python scripts/validate_app.py examples/apps/contract-review-agent
          python scripts/validate_app.py examples/apps/sales-followup-agent
      - name: Regenerate surface schema (Python version may differ)
        run: python scripts/export_surface_schema.py
      - name: Run backend tests
        run: python -m pytest backend/tests
      - name: Run baseline eval
        run: python evals/runners/run_baseline_eval.py

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        working-directory: frontend
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm build

  demo:
    name: Local demo verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LLM_ENABLED: "false"
      LLM_PROVIDER: openai
      OPENAI_API_KEY: ""
      LLM_BASE_URL: ""
      WAIT_ATTEMPTS: "45"
      WAIT_SECONDS: "2"
    steps:
      - uses: actions/checkout@v4
      - name: Build and start local stack
        run: docker compose up --build -d
      - name: Verify local demo
        run: bash scripts/verify_local_demo.sh
      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --tail=200
      - name: Stop local stack
        if: always()
        run: docker compose down -v
