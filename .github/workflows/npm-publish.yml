name: Publish @tilo/react to npm

# Triggered by a tag: git tag npm-v0.1.0 && git push --tags
on:
  push:
    tags:
      - "npm-v*"

jobs:
  publish:
    name: Build and publish @tilo/react
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: packages/react
        run: npm install

      - name: Build
        working-directory: packages/react
        run: npm run build

      - name: Publish to npm
        working-directory: packages/react
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
