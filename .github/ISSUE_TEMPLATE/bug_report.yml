name: Bug Report
description: Report a bug in Tilo Framework
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Tilo is affected?
      options:
        - Artifact Action Runtime
        - Memory (recall / confirmation)
        - Conversation / ROAM Loop
        - Agent / Run / Task
        - LLM / ModelClient
        - Frontend / Demo UI
        - Docker / deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behaviour.
      placeholder: |
        1. Run `docker compose up --build`
        2. Open /demo
        3. Click "Approve"
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Deterministic (no LLM)
        - LLM enabled
        - Unknown
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Tilo version / commit
      placeholder: e.g. main@abc1234
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
