<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 160) rotate(38) scale(520)">
      <stop stop-color="#4338CA" stop-opacity="0.3"/><stop offset="1" stop-color="#070A12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1340 780) rotate(-142) scale(480)">
      <stop stop-color="#10B981" stop-opacity="0.25"/><stop offset="1" stop-color="#070A12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aip" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#6366F1"/><stop offset="1" stop-color="#8B5CF6"/></linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1600" height="960" rx="18" fill="#0B0E17"/>
  <rect width="1600" height="960" rx="18" fill="url(#g1)"/>
  <rect width="1600" height="960" rx="18" fill="url(#g2)"/>

  <!-- 标题 -->
  <text x="800" y="56" text-anchor="middle" fill="#F1F5F9" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5">Tilo — Agent 交互协议 (AIP)</text>
  <text x="800" y="86" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="15">面向 AI 原生软件的开源运行时 — Agent 自主生成 UI，用户行为以结构化信号回流</text>

  <!-- ===== 第一层：核心 Spec + 运行时 ===== -->
  <rect x="60" y="120" width="1480" height="180" rx="14" fill="#111827" stroke="#1E293B" stroke-width="1.5"/>
  <text x="90" y="148" fill="#6366F1" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" letter-spacing="1">第一层</text>
  <text x="145" y="148" fill="#E2E8F0" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600">核心 Spec + 运行时</text>

  <!-- 原语块类型 -->
  <text x="90" y="178" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="500" letter-spacing="0.5">~20 个原语块类型（类似 HTML 标签，稳定不变）</text>
  <rect x="90" y="190" width="84" height="28" rx="6" fill="#1E293B"/><text x="132" y="209" text-anchor="middle" fill="#A5B4FC" font-family="monospace" font-size="11">markdown</text>
  <rect x="182" y="190" width="62" height="28" rx="6" fill="#1E293B"/><text x="213" y="209" text-anchor="middle" fill="#A5B4FC" font-family="monospace" font-size="11">table</text>
  <rect x="252" y="190" width="50" height="28" rx="6" fill="#1E293B"/><text x="277" y="209" text-anchor="middle" fill="#A5B4FC" font-family="monospace" font-size="11">list</text>
  <rect x="310" y="190" width="62" height="28" rx="6" fill="#1E293B"/><text x="341" y="209" text-anchor="middle" fill="#A5B4FC" font-family="monospace" font-size="11">image</text>
  <rect x="380" y="190" width="52" height="28" rx="6" fill="#1E293B"/><text x="406" y="209" text-anchor="middle" fill="#A5B4FC" font-family="monospace" font-size="11">code</text>
  <rect x="440" y="190" width="62" height="28" rx="6" fill="#1E293B"/><text x="471" y="209" text-anchor="middle" fill="#A5B4FC" font-family="monospace" font-size="11">metric</text>
  <rect x="510" y="190" width="58" height="28" rx="6" fill="#1E293B"/><text x="539" y="209" text-anchor="middle" fill="#A5B4FC" font-family="monospace" font-size="11">chart</text>
  <rect x="576" y="190" width="52" height="28" rx="6" fill="#1E293B"/><text x="602" y="209" text-anchor="middle" fill="#A5B4FC" font-family="monospace" font-size="11">form</text>
  <rect x="636" y="190" width="52" height="28" rx="6" fill="#1E293B"/><text x="662" y="209" text-anchor="middle" fill="#A5B4FC" font-family="monospace" font-size="11">card</text>
  <rect x="696" y="190" width="46" height="28" rx="6" fill="#1E293B"/><text x="719" y="209" text-anchor="middle" fill="#A5B4FC" font-family="monospace" font-size="11">diff</text>
  <rect x="90" y="226" width="78" height="28" rx="6" fill="#1E293B"/><text x="129" y="245" text-anchor="middle" fill="#A5B4FC" font-family="monospace" font-size="11">timeline</text>
  <rect x="176" y="226" width="66" height="28" rx="6" fill="#1E293B"/><text x="209" y="245" text-anchor="middle" fill="#A5B4FC" font-family="monospace" font-size="11">kanban</text>
  <rect x="250" y="226" width="76" height="28" rx="6" fill="#1E293B"/><text x="288" y="245" text-anchor="middle" fill="#A5B4FC" font-family="monospace" font-size="11">progress</text>
  <rect x="334" y="226" width="104" height="28" rx="6" fill="#1E293B"/><text x="386" y="245" text-anchor="middle" fill="#A5B4FC" font-family="monospace" font-size="11">confirmation</text>
  <rect x="446" y="226" width="102" height="28" rx="6" fill="#1E293B"/><text x="497" y="245" text-anchor="middle" fill="#A5B4FC" font-family="monospace" font-size="11">memory_card</text>
  <rect x="556" y="226" width="104" height="28" rx="6" fill="#1E293B"/><text x="608" y="245" text-anchor="middle" fill="#A5B4FC" font-family="monospace" font-size="11">tool_preview</text>
  <rect x="668" y="226" width="90" height="28" rx="6" fill="#1E293B" stroke="#475569" stroke-dasharray="3,2"/><text x="713" y="245" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="11">+ 自定义…</text>

