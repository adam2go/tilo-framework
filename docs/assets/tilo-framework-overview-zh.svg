    <rect x="1322" y="262" width="72" height="30" rx="15" fill="#4C1D95"/>
    <text x="1334" y="283" fill="#DDD6FE" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">记忆</text>
    <text x="1322" y="324" fill="#F1F5F9" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">确认式记忆</text>
    <text x="1322" y="352" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="15">自动 / 人工确认</text>
