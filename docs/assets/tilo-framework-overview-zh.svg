    <text x="82" y="588" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="14">动态 Canvas tab，来自 artifact.views</text>
    <rect x="82" y="604" width="72" height="24" rx="12" fill="#1E1B4B"/><text x="94" y="621" fill="#A5B4FC" font-family="Inter,system-ui,sans-serif" font-size="12">风险</text>
    <rect x="162" y="604" width="72" height="24" rx="12" fill="#1E1B4B"/><text x="174" y="621" fill="#A5B4FC" font-family="Inter,system-ui,sans-serif" font-size="12">条款</text>
    <rect x="242" y="604" width="72" height="24" rx="12" fill="#1E1B4B"/><text x="254" y="621" fill="#A5B4FC" font-family="Inter,system-ui,sans-serif" font-size="12">修订</text>
    <rect x="322" y="604" width="72" height="24" rx="12" fill="#1E1B4B"/><text x="334" y="621" fill="#A5B4FC" font-family="Inter,system-ui,sans-serif" font-size="12">管线</text>
    <text x="82" y="660" fill="#64748B" font-family="Inter,system-ui,sans-serif" font-size="13">15+ block 类型 · 前端零硬编码</text>
  </g>

