    <text x="1222" y="562" fill="#E0E7FF" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="700">多轮上下文</text>
    <text x="1222" y="588" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="14">会话 session + 历史轮次</text>
    <rect x="1222" y="604" width="100" height="24" rx="12" fill="#1C2432"/><text x="1234" y="621" fill="#FBBF24" font-family="Inter,system-ui,sans-serif" font-size="12">追问建议</text>
    <rect x="1330" y="604" width="100" height="24" rx="12" fill="#1C2432"/><text x="1342" y="621" fill="#FBBF24" font-family="Inter,system-ui,sans-serif" font-size="12">12 轮上下文</text>
    <text x="1222" y="660" fill="#64748B" font-family="Inter,system-ui,sans-serif" font-size="13">上下文感知建议 · 中英文</text>
