    <rect x="702" y="262" width="72" height="30" rx="15" fill="#78350F"/>
    <text x="714" y="283" fill="#FDE68A" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">决策</text>
    <text x="702" y="324" fill="#F1F5F9" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">人类把关</text>
    <text x="702" y="352" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="15">批准 / 拒绝 / 编辑</text>
  </g>

