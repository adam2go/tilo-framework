  <g filter="url(#shadow)">
    <rect x="990" y="240" width="260" height="140" rx="20" fill="#0F172A" stroke="#10B981" stroke-width="1.5"/>
    <rect x="1012" y="262" width="72" height="30" rx="15" fill="#064E3B"/>
    <text x="1024" y="283" fill="#A7F3D0" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">行动</text>
    <text x="1012" y="324" fill="#F1F5F9" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">安全执行</text>
    <text x="1012" y="352" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="15">后端拥有语义</text>
