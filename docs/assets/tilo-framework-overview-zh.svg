  <text x="920" y="215" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="10">召回 · 候选 · 确认</text>

  <rect x="1040" y="170" width="200" height="65" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="1140" y="195" text-anchor="middle" fill="#F1F5F9" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">确认收件箱</text>
  <text x="1140" y="215" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="10">门控 · 批准 · 拒绝</text>

  <rect x="1260" y="170" width="200" height="65" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="1360" y="195" text-anchor="middle" fill="#F1F5F9" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">链路追踪器</text>
  <text x="1360" y="215" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="10">步骤 · 流式 · 审计</text>

  <rect x="820" y="248" width="640" height="38" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="1140" y="272" text-anchor="middle" fill="#6366F1" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">ROAM 循环：渲染 → 观察 → 行动 → 记忆</text>

  <!-- ===== 第二层：协议适配器 ===== -->
  <rect x="60" y="320" width="1480" height="130" rx="14" fill="#111827" stroke="#1E293B" stroke-width="1.5"/>
  <text x="90" y="348" fill="#10B981" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" letter-spacing="1">第二层</text>
  <text x="145" y="348" fill="#E2E8F0" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600">协议适配器</text>
  <text x="275" y="348" fill="#64748B" font-family="Inter,system-ui,sans-serif" font-size="12">外部协议 → Tilo AIP blocks，零代码集成</text>

  <rect x="90" y="366" width="280" height="62" rx="10" fill="#064E3B" stroke="#10B981" stroke-width="1.2"/>
  <text x="230" y="391" text-anchor="middle" fill="#6EE7B7" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">MCP 适配器</text>
  <text x="230" y="411" text-anchor="middle" fill="#A7F3D0" font-family="Inter,system-ui,sans-serif" font-size="10">Text→markdown · Image→image · Resource→card</text>

  <rect x="400" y="366" width="220" height="62" rx="10" fill="#1E293B" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
