  <text x="1260" y="411" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="10">任意 JSON → 通用 blocks</text>

  <!-- ===== 第三层：渲染器 SDK ===== -->
  <rect x="60" y="470" width="1480" height="130" rx="14" fill="#111827" stroke="#1E293B" stroke-width="1.5"/>
