  <rect x="100" y="830" width="230" height="48" rx="8" fill="#1E293B"/><text x="215" y="855" text-anchor="middle" fill="#6EE7B7" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">MCP</text><text x="215" y="870" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="10">Agent 的手（工具调用）</text>
  <rect x="350" y="830" width="230" height="48" rx="8" fill="#1E293B"/><text x="465" y="855" text-anchor="middle" fill="#93C5FD" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">A2A / ACP</text><text x="465" y="870" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="10">Agent 的嘴（通信协议）</text>
  <rect x="600" y="830" width="230" height="48" rx="8" fill="#1E293B"/><text x="715" y="855" text-anchor="middle" fill="#FCD34D" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">LangChain / CrewAI</text><text x="715" y="870" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="10">Agent 的脑（编排框架）</text>

  <text x="885" y="858" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="300">→</text>

  <rect x="920" y="826" width="520" height="56" rx="10" fill="url(#aip)" fill-opacity="0.15" stroke="#6366F1" stroke-width="1.5"/>
  <text x="1180" y="852" text-anchor="middle" fill="#A5B4FC" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700">Tilo AIP</text>
  <text x="1180" y="872" text-anchor="middle" fill="#C7D2FE" font-family="Inter,system-ui,sans-serif" font-size="11">Agent 的脸 + 耳 — 渲染 UI，观察交互，学习，循环</text>

  <text x="800" y="918" text-anchor="middle" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="11">MCP 是 Agent 的手 · Tilo 是 Agent 的脸 + 耳</text>

