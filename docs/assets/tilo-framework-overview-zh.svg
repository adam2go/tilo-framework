  <rect x="90" y="516" width="300" height="62" rx="10" fill="#422006" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="240" y="541" text-anchor="middle" fill="#FCD34D" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">@tilo/react</text>
  <text x="240" y="561" text-anchor="middle" fill="#FDE68A" font-family="Inter,system-ui,sans-serif" font-size="10">官方参考实现 · 分发表 + GenericBlock 兜底 + Override 支持</text>

