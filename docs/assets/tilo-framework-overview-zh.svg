    <text x="842" y="588" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="14">每一步可见可审计</text>
    <rect x="842" y="604" width="64" height="24" rx="12" fill="#1A2332"/><text x="852" y="621" fill="#86EFAC" font-family="Inter,system-ui,sans-serif" font-size="12">召回</text>
    <rect x="914" y="604" width="64" height="24" rx="12" fill="#1A2332"/><text x="924" y="621" fill="#86EFAC" font-family="Inter,system-ui,sans-serif" font-size="12">规划</text>
    <rect x="986" y="604" width="58" height="24" rx="12" fill="#1A2332"/><text x="996" y="621" fill="#86EFAC" font-family="Inter,system-ui,sans-serif" font-size="12">LLM</text>
    <rect x="1052" y="604" width="64" height="24" rx="12" fill="#1A2332"/><text x="1062" y="621" fill="#86EFAC" font-family="Inter,system-ui,sans-serif" font-size="12">思考</text>
    <text x="842" y="660" fill="#64748B" font-family="Inter,system-ui,sans-serif" font-size="13">流式思考 · 无隐藏推理</text>
  </g>

  <g filter="url(#shadow)">
