    <text x="462" y="588" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="14">对话中的聚焦决策</text>
    <rect x="462" y="604" width="100" height="24" rx="12" fill="#1C2432"/><text x="474" y="621" fill="#93C5FD" font-family="Inter,system-ui,sans-serif" font-size="12">请求审批</text>
    <rect x="570" y="604" width="100" height="24" rx="12" fill="#1C2432"/><text x="582" y="621" fill="#93C5FD" font-family="Inter,system-ui,sans-serif" font-size="12">收集输入</text>
    <text x="462" y="660" fill="#64748B" font-family="Inter,system-ui,sans-serif" font-size="13">8 种 intent · 按步策略决定</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="530" width="360" height="160" rx="18" fill="#0F172A" stroke="#1E293B" stroke-width="1.5"/>
