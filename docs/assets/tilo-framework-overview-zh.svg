  <text x="240" y="711" text-anchor="middle" fill="#FBCFE8" font-family="Inter,system-ui,sans-serif" font-size="10">chart(radar) · diff · table · markdown</text>

  <rect x="420" y="666" width="280" height="62" rx="10" fill="#1E293B" stroke="#EC4899" stroke-width="1"/>
  <text x="560" y="691" text-anchor="middle" fill="#F9A8D4" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">销售跟进 skill.yaml</text>
  <text x="560" y="711" text-anchor="middle" fill="#FBCFE8" font-family="Inter,system-ui,sans-serif" font-size="10">metric · list · tool_preview</text>

  <rect x="730" y="666" width="280" height="62" rx="10" fill="#1E293B" stroke="#EC4899" stroke-width="1"/>
  <text x="870" y="691" text-anchor="middle" fill="#F9A8D4" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">PR 评审 skill.yaml</text>
  <text x="870" y="711" text-anchor="middle" fill="#FBCFE8" font-family="Inter,system-ui,sans-serif" font-size="10">diff · table · checklist · confirmation</text>

  <rect x="1040" y="666" width="400" height="62" rx="10" fill="#0F172A" stroke="#EC4899" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="1240" y="691" text-anchor="middle" fill="#F9A8D4" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">你的自定义 Skill</text>
  <text x="1240" y="711" text-anchor="middle" fill="#FBCFE8" font-family="Inter,system-ui,sans-serif" font-size="10">定义 block_hints + view_hints → LLM 动态组合 UI spec</text>

  <!-- ===== 底部：生态定位 ===== -->
  <rect x="60" y="780" width="1480" height="150" rx="14" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
