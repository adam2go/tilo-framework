  <text x="760" y="391" text-anchor="middle" fill="#CBD5E1" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">A2A 适配器</text>
  <text x="760" y="411" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="10">a2a_task_to_spec（预留）</text>

  <rect x="900" y="366" width="220" height="62" rx="10" fill="#1E293B" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="1010" y="391" text-anchor="middle" fill="#CBD5E1" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">ACP 适配器</text>
  <text x="1010" y="411" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="10">acp_message_to_spec（预留）</text>

  <rect x="1150" y="366" width="220" height="62" rx="10" fill="#1E293B" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
