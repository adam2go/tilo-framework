  <text x="520" y="561" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="10">社区贡献（规划中）</text>

  <rect x="650" y="516" width="240" height="62" rx="10" fill="#1E293B" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="770" y="541" text-anchor="middle" fill="#CBD5E1" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">@tilo/web-components</text>
  <text x="770" y="561" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="10">框架无关（规划中）</text>

  <rect x="920" y="516" width="300" height="62" rx="10" fill="#1E293B" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="1070" y="541" text-anchor="middle" fill="#CBD5E1" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">你自己的渲染器</text>
  <text x="1070" y="561" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="10">解析 JSON spec · 用任何框架渲染 · 覆盖任意 block type</text>

