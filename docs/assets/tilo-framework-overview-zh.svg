      <path d="M2 2L9 5L2 8" fill="none" stroke="#6366F1" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M2 2L9 5L2 8" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="920" fill="#070A12"/>
  <rect width="1600" height="920" fill="url(#g1)"/>
  <rect width="1600" height="920" fill="url(#g2)"/>
  <rect width="1600" height="920" fill="url(#g3)"/>

  <!-- Header -->
  <rect x="60" y="40" width="200" height="44" rx="22" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="84" y="69" fill="#E0E7FF" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700">Tilo Framework</text>

  <text x="60" y="140" fill="#F9FAFB" font-family="Inter,system-ui,sans-serif" font-size="58" font-weight="800">AI 原生产品运行时</text>
  <text x="60" y="186" fill="#9CA3AF" font-family="Inter,system-ui,sans-serif" font-size="24">Agent 渲染决策界面 · 人类确认 · 记忆沉淀 · 动作安全执行</text>

  <!-- ═══════ CORE LOOP (5 nodes) ═══════ -->
  <!-- Goal -->
  <g filter="url(#shadow)">
    <rect x="60" y="240" width="260" height="140" rx="20" fill="#0F172A" stroke="#312E81" stroke-width="1.5"/>
    <rect x="82" y="262" width="72" height="30" rx="15" fill="#312E81"/>
    <text x="94" y="283" fill="#C7D2FE" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">目标</text>
    <text x="82" y="324" fill="#F1F5F9" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">用户目标</text>
    <text x="82" y="352" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="15">创建 Task + Run</text>
  </g>

  <!-- Surface -->
  <g filter="url(#shadow)">
    <rect x="370" y="240" width="260" height="140" rx="20" fill="#0F172A" stroke="#4338CA" stroke-width="1.5"/>
    <rect x="392" y="262" width="72" height="30" rx="15" fill="#4338CA"/>
    <text x="404" y="283" fill="#E0E7FF" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">界面</text>
    <text x="392" y="324" fill="#F1F5F9" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">聚焦 UI</text>
    <text x="392" y="352" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="15">Artifact 驱动的 Canvas</text>
  </g>

