    <text x="842" y="588" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="14">Every step visible and auditable</text>
    <rect x="842" y="604" width="64" height="24" rx="12" fill="#1A2332"/><text x="852" y="621" fill="#86EFAC" font-family="Inter,system-ui,sans-serif" font-size="12">Recall</text>
    <rect x="914" y="604" width="52" height="24" rx="12" fill="#1A2332"/><text x="924" y="621" fill="#86EFAC" font-family="Inter,system-ui,sans-serif" font-size="12">Plan</text>
    <rect x="974" y="604" width="48" height="24" rx="12" fill="#1A2332"/><text x="984" y="621" fill="#86EFAC" font-family="Inter,system-ui,sans-serif" font-size="12">LLM</text>
    <rect x="1030" y="604" width="80" height="24" rx="12" fill="#1A2332"/><text x="1042" y="621" fill="#86EFAC" font-family="Inter,system-ui,sans-serif" font-size="12">Thinking</text>
    <text x="842" y="660" fill="#64748B" font-family="Inter,system-ui,sans-serif" font-size="13">Streaming thinking · no hidden reasoning</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1200" y="530" width="360" height="160" rx="18" fill="#0F172A" stroke="#1E293B" stroke-width="1.5"/>
    <text x="1222" y="562" fill="#E0E7FF" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="700">Multi-turn Context</text>
    <text x="1222" y="588" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="14">Conversation session with history</text>
    <rect x="1222" y="604" width="110" height="24" rx="12" fill="#1C2432"/><text x="1234" y="621" fill="#FBBF24" font-family="Inter,system-ui,sans-serif" font-size="12">Follow-ups</text>
    <rect x="1340" y="604" width="80" height="24" rx="12" fill="#1C2432"/><text x="1352" y="621" fill="#FBBF24" font-family="Inter,system-ui,sans-serif" font-size="12">12 turns</text>
    <text x="1222" y="660" fill="#64748B" font-family="Inter,system-ui,sans-serif" font-size="13">Context-aware suggestions · EN/中文</text>
  </g>

  <!-- ═══════ BOTTOM: Infrastructure ═══════ -->
  <text x="60" y="740" fill="#6B7280" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" letter-spacing="0.08em">INFRASTRUCTURE</text>

  <rect x="60" y="760" width="230" height="64" rx="16" fill="#111827" stroke="#1F2937" stroke-width="1.5"/>
  <text x="82" y="790" fill="#D1D5DB" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600">pip install tilo</text>
  <text x="82" y="810" fill="#6B7280" font-family="Inter,system-ui,sans-serif" font-size="13">8 deps · tilo serve</text>

  <rect x="310" y="760" width="230" height="64" rx="16" fill="#111827" stroke="#1F2937" stroke-width="1.5"/>
  <text x="332" y="790" fill="#D1D5DB" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600">FastAPI Runtime</text>
  <text x="332" y="810" fill="#6B7280" font-family="Inter,system-ui,sans-serif" font-size="13">REST APIs · SQLite/Postgres</text>

  <rect x="560" y="760" width="230" height="64" rx="16" fill="#111827" stroke="#1F2937" stroke-width="1.5"/>
  <text x="582" y="790" fill="#D1D5DB" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600">Interaction Policy</text>
  <text x="582" y="810" fill="#6B7280" font-family="Inter,system-ui,sans-serif" font-size="13">UI only when needed</text>

  <rect x="810" y="760" width="230" height="64" rx="16" fill="#111827" stroke="#1F2937" stroke-width="1.5"/>
  <text x="832" y="790" fill="#D1D5DB" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600">15+ LLM Providers</text>
  <text x="832" y="810" fill="#6B7280" font-family="Inter,system-ui,sans-serif" font-size="13">OpenAI-compatible · streaming</text>

  <rect x="1060" y="760" width="230" height="64" rx="16" fill="#111827" stroke="#1F2937" stroke-width="1.5"/>
  <text x="1082" y="790" fill="#D1D5DB" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600">Declarative Apps</text>
  <text x="1082" y="810" fill="#6B7280" font-family="Inter,system-ui,sans-serif" font-size="13">app.yaml + policy.yaml</text>

  <rect x="1310" y="760" width="250" height="64" rx="16" fill="#111827" stroke="#1F2937" stroke-width="1.5"/>
  <text x="1332" y="790" fill="#D1D5DB" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600">@tilo/frontend</text>
  <text x="1332" y="810" fill="#6B7280" font-family="Inter,system-ui,sans-serif" font-size="13">Next.js · 4 deps · Canvas</text>

  <!-- Bottom tagline -->
  <text x="60" y="876" fill="#4B5563" font-family="Inter,system-ui,sans-serif" font-size="15">Not a chatbot wrapper. Not a dashboard with AI sidebar. The runtime layer where agent output becomes human decisions, backend actions, and confirmed memory.</text>
  <text x="60" y="904" fill="#374151" font-family="Inter,system-ui,sans-serif" font-size="13">github.com/adam2go/tilo-framework · MIT License · v0.1.0</text>
