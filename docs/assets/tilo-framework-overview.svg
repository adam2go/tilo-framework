  <text x="70" y="216" fill="#F5F7FB" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="86" font-weight="800">AI-native SaaS</text>
