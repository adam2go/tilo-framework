  <!-- Arrows between core nodes -->
  <line x1="320" y1="310" x2="368" y2="310" stroke="#6366F1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="630" y1="310" x2="678" y2="310" stroke="#6366F1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="940" y1="310" x2="988" y2="310" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="1250" y1="310" x2="1298" y2="310" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Memory → Goal feedback loop -->
  <path d="M1430 382 L1430 420 Q1430 436 1414 436 L126 436 Q110 436 110 420 L110 382" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="720" y="454" fill="#7C3AED" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500">Memory recalled in next run</text>

