  <text x="60" y="510" fill="#6B7280" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" letter-spacing="0.08em">WHAT THE AGENT PRODUCES</text>

  <g filter="url(#shadow)">
    <rect x="60" y="530" width="360" height="160" rx="18" fill="#0F172A" stroke="#1E293B" stroke-width="1.5"/>
    <text x="82" y="562" fill="#E0E7FF" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="700">Artifact + Views</text>
    <text x="82" y="588" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="14">Dynamic Canvas tabs from artifact.views</text>
    <rect x="82" y="604" width="78" height="24" rx="12" fill="#1E1B4B"/><text x="94" y="621" fill="#A5B4FC" font-family="Inter,system-ui,sans-serif" font-size="12">Risks</text>
    <rect x="168" y="604" width="88" height="24" rx="12" fill="#1E1B4B"/><text x="180" y="621" fill="#A5B4FC" font-family="Inter,system-ui,sans-serif" font-size="12">Clauses</text>
    <rect x="264" y="604" width="88" height="24" rx="12" fill="#1E1B4B"/><text x="276" y="621" fill="#A5B4FC" font-family="Inter,system-ui,sans-serif" font-size="12">Revision</text>
    <text x="82" y="660" fill="#64748B" font-family="Inter,system-ui,sans-serif" font-size="13">15+ block types · zero frontend hardcoding</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="440" y="530" width="360" height="160" rx="18" fill="#0F172A" stroke="#1E293B" stroke-width="1.5"/>
    <text x="462" y="562" fill="#E0E7FF" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="700">Surface Turns</text>
    <text x="462" y="588" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="14">Focused decisions in conversation</text>
    <rect x="462" y="604" width="120" height="24" rx="12" fill="#1C2432"/><text x="474" y="621" fill="#93C5FD" font-family="Inter,system-ui,sans-serif" font-size="12">request_approval</text>
    <rect x="590" y="604" width="100" height="24" rx="12" fill="#1C2432"/><text x="602" y="621" fill="#93C5FD" font-family="Inter,system-ui,sans-serif" font-size="12">collect_input</text>
    <text x="462" y="660" fill="#64748B" font-family="Inter,system-ui,sans-serif" font-size="13">8 intents · Interaction Policy per step</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="530" width="360" height="160" rx="18" fill="#0F172A" stroke="#1E293B" stroke-width="1.5"/>
