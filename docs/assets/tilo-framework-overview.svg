<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 160) rotate(38) scale(520)">
      <stop stop-color="#4338CA" stop-opacity="0.3"/><stop offset="1" stop-color="#070A12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1350 250) rotate(136) scale(500)">
      <stop stop-color="#047857" stop-opacity="0.25"/><stop offset="1" stop-color="#070A12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(830 820) rotate(90) scale(620)">
      <stop stop-color="#7C3AED" stop-opacity="0.2"/><stop offset="1" stop-color="#070A12" stop-opacity="0"/>
    </radialGradient>
