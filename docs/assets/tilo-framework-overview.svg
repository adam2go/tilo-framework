  <g filter="url(#shadow)">
    <rect x="1300" y="240" width="260" height="140" rx="20" fill="#0F172A" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="1322" y="262" width="96" height="30" rx="15" fill="#4C1D95"/>
    <text x="1334" y="283" fill="#DDD6FE" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">MEMORY</text>
    <text x="1322" y="324" fill="#F1F5F9" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">Confirmed</text>
    <text x="1322" y="352" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="15">Auto / human-gated</text>
