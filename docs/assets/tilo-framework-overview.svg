      <path d="M2 2L9 5L2 8" fill="none" stroke="#6366F1" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M2 2L9 5L2 8" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="920" fill="#070A12"/>
  <rect width="1600" height="920" fill="url(#g1)"/>
  <rect width="1600" height="920" fill="url(#g2)"/>
  <rect width="1600" height="920" fill="url(#g3)"/>

  <!-- Header -->
  <rect x="60" y="40" width="200" height="44" rx="22" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="84" y="69" fill="#E0E7FF" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700">Tilo Framework</text>

  <text x="60" y="140" fill="#F9FAFB" font-family="Inter,system-ui,sans-serif" font-size="58" font-weight="800">The AI-Native Product Runtime</text>
  <text x="60" y="186" fill="#9CA3AF" font-family="Inter,system-ui,sans-serif" font-size="24">Agents render decisions. Humans confirm. Memory persists. Actions execute safely.</text>

  <!-- ═══════ CORE LOOP (5 nodes) ═══════ -->
  <!-- Goal -->
  <g filter="url(#shadow)">
    <rect x="60" y="240" width="260" height="140" rx="20" fill="#0F172A" stroke="#312E81" stroke-width="1.5"/>
    <rect x="82" y="262" width="72" height="30" rx="15" fill="#312E81"/>
    <text x="94" y="283" fill="#C7D2FE" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">GOAL</text>
    <text x="82" y="324" fill="#F1F5F9" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">User Goal</text>
    <text x="82" y="352" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="15">Task + Run created</text>
  </g>

  <!-- Surface -->
  <g filter="url(#shadow)">
    <rect x="370" y="240" width="260" height="140" rx="20" fill="#0F172A" stroke="#4338CA" stroke-width="1.5"/>
    <rect x="392" y="262" width="100" height="30" rx="15" fill="#4338CA"/>
    <text x="404" y="283" fill="#E0E7FF" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">SURFACE</text>
    <text x="392" y="324" fill="#F1F5F9" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">Focused UI</text>
    <text x="392" y="352" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="15">Artifact-driven Canvas</text>
  </g>

  <!-- Decision -->
  <g filter="url(#shadow)">
    <rect x="680" y="240" width="260" height="140" rx="20" fill="#0F172A" stroke="#F59E0B" stroke-width="1.5"/>
    <rect x="702" y="262" width="104" height="30" rx="15" fill="#78350F"/>
    <text x="714" y="283" fill="#FDE68A" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">DECISION</text>
    <text x="702" y="324" fill="#F1F5F9" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">Human Gate</text>
    <text x="702" y="352" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="15">Approve / Reject / Edit</text>
  </g>

  <!-- Action -->
  <g filter="url(#shadow)">
    <rect x="990" y="240" width="260" height="140" rx="20" fill="#0F172A" stroke="#10B981" stroke-width="1.5"/>
    <rect x="1012" y="262" width="82" height="30" rx="15" fill="#064E3B"/>
    <text x="1024" y="283" fill="#A7F3D0" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">ACTION</text>
    <text x="1012" y="324" fill="#F1F5F9" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">Safe Execution</text>
    <text x="1012" y="352" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="15">Backend-owned semantics</text>
  </g>

