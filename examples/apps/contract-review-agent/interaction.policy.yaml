id: contract-review-policy
version: "0.1"

# Phase 1 of the Surface Protocol refactor: each rule now declares an
# explicit `intent:` from the closed Surface Protocol vocabulary
# (docs/SURFACE_PROTOCOL.md §3). The legacy `surface:` field is retained
# during the migration window for backward-compatible renderers; it will
# be removed in a later milestone (see docs/REFACTOR_BLUEPRINT.md Phase 6).

budget:
  max_mini_surfaces_per_run: 3
  max_confirmations_per_run: 2
  max_memory_cards_per_run: 1

rules:
  - id: high-risk-liability-needs-confirmation
    when:
      artifact_type: contract_review
      risk_level: high
      requires_user_decision: true
      category: liability
    decision: mini_surface
    intent: request_approval
    surface: MiniIssueCard
    reason: high_risk_human_confirmation_required

  - id: normal-finding-no-ui
    when:
      artifact_type: contract_review
      risk_level: medium
    decision: no_ui
    reason: agent_can_continue_autonomously

  - id: open-full-review
    when:
      user_action: open_full_review
    decision: rich_surface
    intent: escalate_to_rich
    surface: ContractReviewArtifact
    reason: user_requested_details

  - id: revision-approved-preview
    when:
      user_action: approve_revision
    decision: mini_surface
    intent: present_result
    surface: MiniRevisionPreview
    reason: approved_revision_needs_compact_preview

  - id: memory-after-preference
    when:
      signal: user_preference_detected
    decision: no_ui
    reason: memories_are_auto_confirmed_no_ui_needed

  - id: draft-email-choice
    when:
      signal: draft_email_requested
    decision: mini_surface
    intent: offer_choices
    surface: MiniChoiceCard
    reason: draft_email_requires_user_choice_before_external_action

  - id: explanation-text-is-enough
    when:
      signal: text_explanation_requested
    decision: ask_text
    reason: text_response_is_enough_for_explanation

  - id: general-followup-no-ui
    when:
      signal: general_followup
    decision: no_ui
    reason: general_followup_does_not_need_ui
